<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBox-AdamLeung</title>
    <link rel="icon" type="image/png" href="image/bot.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="h1">
            <span class="brand-main">ChatBox</span>
            <span class="brand-mark">🦐</span>
        </div>
        <!-- 添加顶部设置栏 -->
        <div class="settings-bar">
            <div class="settings-left">
                <label class="control-field endpoint-select" aria-label="API Provider">
                    <span>Provider</span>
                    <select id="endpoint-selector" onchange="models_from_endpoint()">
                        <option value="https://api.deepseek.com/v1/chat/completions">DeepSeek</option>
                        <option value="https://api.siliconflow.cn/v1/chat/completions">SiliconFlow</option>
                    </select>
                </label>
                <label class="control-field model-select" aria-label="Model">
                    <span>Model</span>
                    <select id="model-selector"></select>
                </label>
                <div class="api-key-manager">
                    <button onclick="showApiKeyManager()" class="api-key-btn">
                        <span class="key-icon">🔑</span>
                        <span id="apiKeyStatus">API Key</span>
                    </button>
                </div>
                <div class="theme-toggle">
                    <span aria-hidden="true">🌞</span>
                    <label class="switch">
                        <input type="checkbox" id="themeToggle" onclick="toggleTheme()">
                        <span class="slider round"></span>
                    </label>
                    <span aria-hidden="true">🌙</span>
                </div>
            </div>
        </div>

        <div class="messages" id="messages"></div>
        <div id="loading" class="loading" style="display: none;">思考中...</div>
        <div class="input-container">
            <textarea id="chat-input" rows="1" placeholder="输入消息..." spellcheck="false"></textarea>
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <!-- API Key 管理弹窗 -->
    <div id="apiKeyManager" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>API Key 管理</h2>
                <button onclick="hideApiKeyManager()" class="close-btn">×</button>
            </div>
            <div class="modal-body">
                <div class="api-key-status">
                    <p>默认API Key: <span id="currentKeyStatus" >未配置</span></p>
                </div>
                <div class="api-key-input">
                    <input type="password" id="apiKeyInput" placeholder="输入新的 API Key" autocomplete="off"/>
                </div>
                <div class="api-key-input default-key-unlock">
                    <input type="password" id="defaultKeyPasswordInput" placeholder="输入默认 Key 解锁密码" autocomplete="off"/>
                </div>
                <p id="defaultKeyUnlockStatus" class="default-key-status">默认 API Key 需要密码解锁后使用。</p>
                <div class="api-key-actions">
                    <button onclick="updateApiKey()" class="primary-btn">更新</button>
                    <button onclick="defaultApiKey()" class="danger-btn">解锁默认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="env.js?v=1"></script>
    <script src="script.js"></script>
</body>
</html>
